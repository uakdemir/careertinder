# JobHunter Configuration
# Copy this file to config.yaml and customize for your setup.
# Infrastructure settings only — rarely changed, not editable from the dashboard.
# API keys belong in .env (never in this file).
#
# Operational settings (scraping, filtering, scheduling, notifications) are stored
# in the SQLite database and editable from the dashboard. They are seeded with
# Pydantic defaults on first migration (alembic upgrade head).

ai_models:
  tier2:
    provider: "openai"
    model: "gpt-5-nano"
    max_tokens: 300
    temperature: 0.1
  tier3:
    provider: "openai"
    model: "gpt-5.2"
    max_tokens: 2000
    temperature: 0.3
  content_gen:
    provider: "openai"
    model: "gpt-5.4"
    max_tokens: 2000
    temperature: 0.5

database:
  path: "data/jobhunter.db"
  echo_sql: false

dashboard:
  port: 8501
  page_size: 25
